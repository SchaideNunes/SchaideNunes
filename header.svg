<svg fill="none" viewBox="0 0 800 400" width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;800&amp;display=swap');
        
        .container {
          width: 100%;
          height: 400px;
          background: #000;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          position: relative;
          overflow: hidden;
          font-family: 'Inter', sans-serif;
        }

        /* Simulação do StarsCanvas */
        .stars-container {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          z-index: 0;
        }
        
        .star {
          position: absolute;
          background: white;
          border-radius: 50%;
          animation: twinkle var(--d) infinite ease-in-out;
        }

        @keyframes twinkle {
          0%, 100% { opacity: 0.1; transform: scale(1); }
          50% { opacity: 0.8; transform: scale(1.1); }
        }

        /* Conteúdo de Texto */
        .content {
          position: relative;
          z-index: 1;
          text-align: center;
        }

        .name {
          font-size: 64px;
          font-weight: 800;
          color: #ffffff;
          margin-bottom: 10px;
          letter-spacing: -2px;
          text-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .typing-container {
          height: 50px;
          display: flex;
          justify-content: center;
          align-items: center;
        }

        .role {
          position: absolute;
          font-size: 32px;
          font-weight: 400;
          color: #F59E0B; /* Dourado do portfólio */
          opacity: 0;
          transform: translateY(20px);
          animation: rotateRole 6s infinite ease-in-out;
        }

        .role:nth-child(1) { animation-delay: 0s; }
        .role:nth-child(2) { animation-delay: 3s; }

        @keyframes rotateRole {
          0% { opacity: 0; transform: translateY(20px); }
          10% { opacity: 1; transform: translateY(0); }
          45% { opacity: 1; transform: translateY(0); }
          55% { opacity: 0; transform: translateY(-20px); }
          100% { opacity: 0; transform: translateY(-20px); }
        }
      </style>
      <div class="container">
        <div class="stars-container">
          <!-- Estrelas geradas para simular o fundo do portfólio -->
          <div class="star" style="top:10%;left:5%;width:1px;height:1px;--d:3s"></div>
          <div class="star" style="top:30%;left:15%;width:2px;height:2px;--d:4s"></div>
          <div class="star" style="top:15%;left:45%;width:1px;height:1px;--d:2s"></div>
          <div class="star" style="top:40%;left:80%;width:1px;height:1px;--d:5s"></div>
          <div class="star" style="top:70%;left:10%;width:2px;height:2px;--d:3s"></div>
          <div class="star" style="top:85%;left:40%;width:1px;height:1px;--d:4s"></div>
          <div class="star" style="top:60%;left:70%;width:2px;height:2px;--d:2.5s"></div>
          <div class="star" style="top:25%;left:90%;width:1px;height:1px;--d:3.5s"></div>
          <div class="star" style="top:50%;left:50%;width:1px;height:1px;--d:6s"></div>
          <div class="star" style="top:10%;left:60%;width:2px;height:2px;--d:3s"></div>
          <div class="star" style="top:80%;left:85%;width:1px;height:1px;--d:2s"></div>
          <div class="star" style="top:90%;left:20%;width:2px;height:2px;--d:4s"></div>
          <div class="star" style="top:5%;left:30%;width:1px;height:1px;--d:5s"></div>
          <div class="star" style="top:35%;left:65%;width:1px;height:1px;--d:3s"></div>
          <div class="star" style="top:55%;left:25%;width:2px;height:2px;--d:4.5s"></div>
          <!-- Mais estrelas menores para densidade -->
          <div class="star" style="top:45%;left:35%;width:1px;height:1px;--d:2s"></div>
          <div class="star" style="top:65%;left:55%;width:1.5px;height:1.5px;--d:3s"></div>
          <div class="star" style="top:20%;left:75%;width:1px;height:1px;--d:4s"></div>
          <div class="star" style="top:75%;left:95%;width:1px;height:1px;--d:5s"></div>
        </div>
        
        <div class="content">
          <div class="name">Schaide Nunes</div>
          <div class="typing-container">
            <div class="role">Web Developer</div>
            <div class="role">Software Engineer</div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
