<svg fill="none" viewBox="0 0 800 240" width="800" height="240" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          width: 100%;
          height: 240px;
          background: #000;
          display: flex;
          justify-content: center;
          align-items: center;
          position: relative;
          overflow: hidden;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Estrelas */
        .star {
          position: absolute;
          background: white;
          border-radius: 50%;
          opacity: 0.3;
          animation: twinkle var(--duration) infinite ease-in-out;
        }
        @keyframes twinkle {
          0%, 100% { opacity: 0.3; transform: scale(1); }
          50% { opacity: 1; transform: scale(1.2); }
        }

        /* Animação de Texto (Estilo GSAP) */
        .text-wrapper {
          position: relative;
          height: 60px;
          text-align: center;
          display: flex;
          justify-content: center;
          align-items: center;
        }
        
        .text {
          position: absolute;
          font-size: 48px;
          font-weight: 800;
          color: #F59E0B;
          opacity: 0;
          transform: translateY(20px);
          white-space: nowrap;
          text-shadow: 0 0 20px rgba(245,158,11,0.4);
          animation: rotateText 9s infinite ease-in-out;
        }

        .text:nth-child(1) { animation-delay: 0s; }
        .text:nth-child(2) { animation-delay: 3s; }
        .text:nth-child(3) { animation-delay: 6s; }

        @keyframes rotateText {
          0% { opacity: 0; transform: translateY(20px); }
          5% { opacity: 1; transform: translateY(0); }
          30% { opacity: 1; transform: translateY(0); }
          35% { opacity: 0; transform: translateY(-20px); }
          100% { opacity: 0; transform: translateY(-20px); }
        }
      </style>
      <div class="container">
        <!-- Estrelas no Fundo -->
        <div class="star" style="top: 20%; left: 10%; width: 2px; height: 2px; --duration: 3s;"></div>
        <div class="star" style="top: 50%; left: 25%; width: 1px; height: 1px; --duration: 2s;"></div>
        <div class="star" style="top: 80%; left: 15%; width: 3px; height: 3px; --duration: 4s;"></div>
        <div class="star" style="top: 30%; left: 70%; width: 2px; height: 2px; --duration: 3.5s;"></div>
        <div class="star" style="top: 10%; left: 90%; width: 1px; height: 1px; --duration: 2.5s;"></div>
        <div class="star" style="top: 60%; left: 85%; width: 2px; height: 2px; --duration: 3s;"></div>
        
        <div class="text-wrapper">
          <div class="text">Schaide Nunes</div>
          <div class="text">Web Developer</div>
          <div class="text">Software Engineer</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
